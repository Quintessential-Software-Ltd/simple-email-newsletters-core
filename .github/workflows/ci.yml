name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.2', '8.4' ]
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl
          coverage: none

      - name: Syntax check every PHP file
        run: |
          set -e
          while IFS= read -r -d '' f; do
            php -l "$f" > /dev/null
          done < <(find . -name '*.php' -not -path './.git/*' -print0)
          echo "All PHP files lint clean."

      - name: Run test suite
        run: php tests/run-tests.php

      - name: Validate block.json
        run: php -r 'json_decode(file_get_contents("blocks/subscribe/block.json"), true, 512, JSON_THROW_ON_ERROR); echo "block.json valid\n";'
